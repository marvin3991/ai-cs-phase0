services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag   # 僅本機開發;正式環境改用秘密管理,不得沿用
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 3s
      retries: 10

# Langfuse 不在此自造 compose(v3 需 ClickHouse/Redis/MinIO 多服務,設定易過時)。
# 自架請用官方 repo 的 docker-compose:https://github.com/langfuse/langfuse
# (導入前先確認授權條款,見藍圖 §10-3)

volumes:
  pgdata:
